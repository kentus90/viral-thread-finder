<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral Thread Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24;
    --border: rgba(255,255,255,0.08); --border-bright: rgba(255,255,255,0.18);
    --accent: #00e5a0; --accent3: #f59e0b;
    --text: #f0f0f5; --text-muted: #8888a0; --text-dim: #555568;
    --red: #ff4466;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .blob1 { position: fixed; top: -200px; left: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,229,160,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .blob2 { position: fixed; bottom: -200px; right: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(124,58,237,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .container { max-width: 900px; margin: 0 auto; padding: 60px 24px 80px; position: relative; z-index: 1; }
  .header { margin-bottom: 48px; text-align: center; }
  .header-badge { display: inline-flex; align-items: center; gap: 8px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.2); padding: 6px 14px; border-radius: 100px; margin-bottom: 20px; }
  .header-badge::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)} }
  h1 { font-family: 'Space Mono', monospace; font-size: clamp(26px, 5vw, 44px); font-weight: 700; line-height: 1.1; margin-bottom: 14px; }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 15px; color: var(--text-muted); max-width: 480px; margin: 0 auto; line-height: 1.6; }
  .search-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; margin-bottom: 28px; }
  .input-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .topic-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--text); outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  .topic-input:focus { border-color: var(--accent); }
  .topic-input::placeholder { color: var(--text-dim); }
  .search-btn { background: var(--accent); border: none; border-radius: 12px; color: #0a0a0f; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 13px; padding: 14px 22px; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; -webkit-appearance: none; }
  .search-btn:active { opacity: 0.7; }
  .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .filters-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .filter-label { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }
  .filter-chip { display: flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; padding: 6px 12px; font-size: 13px; color: var(--text-muted); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .filter-chip.active { background: rgba(0,229,160,0.1); border-color: rgba(0,229,160,0.35); color: var(--accent); }
  .chip-reddit.active { background: rgba(255,100,0,0.1); border-color: rgba(255,100,0,0.35); color: #ff6400; }
  .chip-telegram.active { background: rgba(40,160,240,0.1); border-color: rgba(40,160,240,0.35); color: #28a0f0; }
  .chip-twitter.active { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); color: #ddd; }
  .chip-web.active { background: rgba(124,58,237,0.1); border-color: rgba(124,58,237,0.35); color: #a78bfa; }
  .chip-news.active { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.35); color: var(--accent3); }
  .chip-youtube.active { background: rgba(255,50,50,0.1); border-color: rgba(255,50,50,0.35); color: #ff3232; }
  .filter-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .status-bar { display: none; align-items: center; gap: 12px; margin-bottom: 24px; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text-muted); }
  .status-bar.visible { display: flex; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,229,160,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { display: none; background: rgba(255,68,102,0.07); border: 1px solid rgba(255,68,102,0.25); border-radius: 12px; padding: 16px 18px; color: #ff8899; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
  .error-box.visible { display: block; }
  .results-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; }
  .results-topic { font-size: 20px; font-weight: 500; }
  .results-topic em { font-style: normal; color: var(--accent); }
  .results-count { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .threads-list { display: flex; flex-direction: column; gap: 12px; }
  .thread-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; position: relative; overflow: hidden; animation: fadeSlide 0.3s ease both; }
  .thread-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--card-accent, var(--accent)); }
  @keyframes fadeSlide { from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)} }
  .thread-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
  .source-badge { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; padding: 3px 9px; border-radius: 100px; font-weight: 700; flex-shrink: 0; }
  .badge-reddit { background: rgba(255,100,0,0.12); color: #ff6400; }
  .badge-telegram { background: rgba(40,160,240,0.12); color: #28a0f0; }
  .badge-twitter,.badge-x { background: rgba(255,255,255,0.08); color: #c0c0c0; }
  .badge-web,.badge-forum { background: rgba(124,58,237,0.12); color: #a78bfa; }
  .badge-news { background: rgba(245,158,11,0.12); color: var(--accent3); }
  .badge-youtube { background: rgba(255,50,50,0.12); color: #ff3232; }
  .viral-score { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .thread-title { font-size: 15px; font-weight: 500; line-height: 1.4; margin-bottom: 8px; }
  .thread-title a { color: var(--text); text-decoration: none; }
  .thread-title a:active { color: var(--accent); }
  .thread-meta { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
  .thread-stats { display: flex; flex-wrap: wrap; gap: 12px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .stat-val { color: var(--text-muted); font-weight: 700; }
  .tips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
  .tip-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; padding: 8px 14px; font-size: 13px; color: var(--text-muted); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .tip-chip:active { background: rgba(255,255,255,0.05); }
  .raw-section { margin-top: 16px; }
  .raw-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-dim); cursor: pointer; display: none; }
  .raw-content { display: none; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-top: 10px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-muted); white-space: pre-wrap; word-break: break-all; max-height: 250px; overflow-y: auto; }
  @media (max-width: 600px) {
    .container { padding: 28px 14px 60px; }
    .input-row { flex-direction: column; }
    .search-btn { width: 100%; padding: 16px; font-size: 14px; }
  }
</style>
</head>
<body>
<div class="blob1"></div>
<div class="blob2"></div>
<div class="container">
  <div class="header">
    <div class="header-badge">Viral Thread Finder</div>
    <h1>Trova i thread<br><span>piu virali</span> del web</h1>
    <p class="subtitle">Inserisci un argomento e scopri i thread piu discussi su Reddit, Telegram, X, forum e siti web.</p>
  </div>
  <div class="search-panel">
    <div class="input-row">
      <input type="text" class="topic-input" id="topic-input" placeholder="es. intelligenza artificiale, PS5, crypto..." />
      <button class="search-btn" id="search-btn" onclick="doSearch()">CERCA</button>
    </div>
    <div class="filters-row">
      <span class="filter-label">Fonti:</span>
      <div class="filter-chip chip-reddit active" onclick="toggleFilter(this,'reddit')"><span class="dot"></span> Reddit</div>
      <div class="filter-chip chip-twitter active" onclick="toggleFilter(this,'twitter')"><span class="dot"></span> X</div>
      <div class="filter-chip chip-telegram active" onclick="toggleFilter(this,'telegram')"><span class="dot"></span> Telegram</div>
      <div class="filter-chip chip-web active" onclick="toggleFilter(this,'web')"><span class="dot"></span> Web</div>
      <div class="filter-chip chip-news active" onclick="toggleFilter(this,'news')"><span class="dot"></span> News</div>
      <div class="filter-chip chip-youtube active" onclick="toggleFilter(this,'youtube')"><span class="dot"></span> YouTube</div>
    </div>
  </div>
  <div class="tips" id="tips">
    <div class="tip-chip" onclick="useTip('Intelligenza artificiale')">🤖 AI</div>
    <div class="tip-chip" onclick="useTip('PlayStation 5')">🎮 PS5</div>
    <div class="tip-chip" onclick="useTip('Bitcoin')">₿ Bitcoin</div>
    <div class="tip-chip" onclick="useTip('Juventus')">⚽ Juve</div>
    <div class="tip-chip" onclick="useTip('Politica italiana')">🇮🇹 Politica</div>
    <div class="tip-chip" onclick="useTip('Netflix serie TV')">🎬 Netflix</div>
    <div class="tip-chip" onclick="useTip('SpaceX')">🚀 SpaceX</div>
  </div>
  <div class="status-bar" id="status-bar"><div class="spinner"></div><span id="status-text">Ricerca in corso...</span></div>
  <div class="error-box" id="error-box"></div>
  <div id="results"></div>
  <div class="raw-section">
    <button class="raw-btn" id="raw-btn" onclick="toggleRaw()">mostra risposta raw</button>
    <pre class="raw-content" id="raw-content"></pre>
  </div>
</div>
<script>
var activeFilters = ['reddit','twitter','telegram','web','news','youtube'];

function toggleFilter(el, name) {
  el.classList.toggle('active');
  var i = activeFilters.indexOf(name);
  if (i > -1) activeFilters.splice(i, 1);
  else activeFilters.push(name);
}

function useTip(text) {
  document.getElementById('topic-input').value = text;
}

function toggleRaw() {
  var el = document.getElementById('raw-content');
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function setStatus(text, show) {
  var bar = document.getElementById('status-bar');
  bar.classList.toggle('visible', show);
  document.getElementById('status-text').textContent = text;
}

function showError(msg) {
  var el = document.getElementById('error-box');
  el.innerHTML = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('error-box').classList.remove('visible');
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(n) {
  if (!n) return null;
  var num = parseInt(String(n).replace(/[^0-9]/g,''));
  if (isNaN(num)) return String(n);
  if (num >= 1000000) return (num/1000000).toFixed(1)+'M';
  if (num >= 1000) return (num/1000).toFixed(1)+'K';
  return String(num);
}

var SOURCE_COLORS = { reddit:'#ff6400', telegram:'#28a0f0', twitter:'#888', x:'#888', web:'#a78bfa', forum:'#a78bfa', news:'#f59e0b', youtube:'#ff3232' };
var BADGE_MAP = { reddit:'badge-reddit', telegram:'badge-telegram', twitter:'badge-twitter', x:'badge-x', web:'badge-web', forum:'badge-forum', news:'badge-news', youtube:'badge-youtube' };

function parseJSON(text) {
  var parsed = null;
  try { parsed = JSON.parse(text.trim()); return parsed; } catch(e){}
  var m = text.match(/```[\s\S]*?({[\s\S]*?"threads"[\s\S]*?})[\s\S]*?```/);
  if (m) { try { parsed = JSON.parse(m[1]); return parsed; } catch(e){} }
  var m2 = text.match(/{[\s\S]*?"threads"[\s\S]*?}/);
  if (m2) { try { parsed = JSON.parse(m2[0]); return parsed; } catch(e){} }
  var m3 = text.match(/{[\s\S]*}/);
  if (m3) { try { parsed = JSON.parse(m3[0]); return parsed; } catch(e){} }
  var m4 = text.match(/\[[\s\S]*\]/);
  if (m4) { try { return { threads: JSON.parse(m4[0]) }; } catch(e){} }
  return null;
}

function renderThreads(threads, topic) {
  var section = document.getElementById('results');
  var filtered = threads.filter(function(t) {
    var s = (t.source||'').toLowerCase();
    if (!activeFilters.length) return true;
    if (s === 'x') return activeFilters.indexOf('twitter') > -1;
    if (s === 'forum') return activeFilters.indexOf('web') > -1;
    return activeFilters.indexOf(s) > -1;
  });
  if (!filtered.length) {
    section.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim)">Nessun thread trovato.</div>';
    return;
  }
  var html = '<div class="results-header"><div class="results-topic">Virali su <em>'+escHtml(topic)+'</em></div><div class="results-count">'+filtered.length+' risultati</div></div><div class="threads-list">';
  for (var i = 0; i < filtered.length; i++) {
    var t = filtered[i];
    var s = (t.source||'web').toLowerCase();
    var accent = SOURCE_COLORS[s] || '#a78bfa';
    var badge = BADGE_MAP[s] || 'badge-web';
    var emoji = t.viral_score >= 9 ? '🔥🔥' : t.viral_score >= 7 ? '🔥' : t.viral_score >= 5 ? '⚡' : '📌';
    var titleHtml = t.url ? '<a href="'+escHtml(t.url)+'" target="_blank">'+escHtml(t.title)+'</a>' : escHtml(t.title);
    var stats = [];
    if (fmt(t.upvotes||t.likes||t.reactions)) stats.push('👍 <span class="stat-val">'+fmt(t.upvotes||t.likes||t.reactions)+'</span>');
    if (fmt(t.comments)) stats.push('💬 <span class="stat-val">'+fmt(t.comments)+'</span>');
    if (fmt(t.views)) stats.push('👁 <span class="stat-val">'+fmt(t.views)+'</span>');
    if (t.date) stats.push('📅 <span class="stat-val">'+escHtml(t.date)+'</span>');
    html += '<div class="thread-card" style="--card-accent:'+accent+';animation-delay:'+(i*50)+'ms">';
    html += '<div class="thread-header"><span class="source-badge '+badge+'">'+escHtml(s.toUpperCase())+'</span><span class="viral-score">'+emoji+' '+( t.viral_score||'?')+'/10</span></div>';
    html += '<div class="thread-title">'+titleHtml+'</div>';
    if (t.summary) html += '<div class="thread-meta">'+escHtml(t.summary)+'</div>';
    if (stats.length) html += '<div class="thread-stats">'+stats.join('')+'</div>';
    html += '</div>';
  }
  html += '</div>';
  section.innerHTML = html;
  document.getElementById('tips').style.display = 'none';
}

function doSearch() {
  var topic = document.getElementById('topic-input').value.trim();
  if (!topic) { document.getElementById('topic-input').focus(); return; }
  var btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.textContent = '...';
  hideError();
  setStatus('Ricerca in corso...', true);
  document.getElementById('results').innerHTML = '';
  document.getElementById('raw-btn').style.display = 'none';
  document.getElementById('raw-content').style.display = 'none';

  fetch('/api/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ topic: topic, sources: activeFilters })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    btn.disabled = false;
    btn.textContent = 'CERCA';
    setStatus('', false);
    if (data.error) { showError('Errore: ' + data.error); return; }
    var text = data.text || '';
    document.getElementById('raw-content').textContent = text || '(vuoto)';
    document.getElementById('raw-btn').style.display = 'block';
    if (!text) { showError('Nessuna risposta dal server.'); return; }
    var parsed = parseJSON(text);
    if (!parsed || !parsed.threads) {
      showError('Risposta non valida. Tocca "mostra risposta raw" per vedere cosa ha risposto il modello.');
      return;
    }
    renderThreads(parsed.threads, topic);
  })
  .catch(function(err) {
    btn.disabled = false;
    btn.textContent = 'CERCA';
    setStatus('', false);
    showError('Errore di rete: ' + err.message);
  });
}

document.getElementById('topic-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
